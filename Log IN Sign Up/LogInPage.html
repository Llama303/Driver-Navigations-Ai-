<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver-Nav Log In</title>
    <link rel="stylesheet" href="../Styl.css">
    <link rel="stylesheet" href="../MainStylsheet.css">
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Oswald&family=Gravitas One&family=Platypi:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
</head>
<body class="themeable bg-[#1a1a1a] text-white flex items-center justify-center h-[100vh]">

    <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle dark/light theme" title="Toggle theme">
        <span class="icon-sun" aria-hidden="true">☀</span>
        <span class="icon-moon" aria-hidden="true">🌙</span>
    </button>

    <div class="auth-card container rounded-lg bg-[#010301] p-6 flex flex-col items-center justify-center w-96 max-w-[90vw] shadow-xl border border-[#1a2a1a]">
        <h1 class="text-2xl font-bold cursor-default mb-1">Drive-NAV</h1>
        <p class="auth-text-muted text-sm mb-6 cursor-default">Sign in to your account</p>

    <form action="Login.PHP" method="post" class="text-[#000000] space-y-3 w-full">
        <div id="login-success" class="text-[#2fa12f] text-sm text-center min-h-[1.25rem] mb-1" aria-live="polite"></div>
        <div id="login-error" class="text-red-400 text-sm text-center min-h-[1.25rem]" aria-live="polite" role="alert"></div>

        <div class="space-y-1">
            <label for="username" class="auth-text-muted text-sm cursor-default">Username</label>
            <input type="text" placeholder="Enter your username" name="username" id="username" required
                autocomplete="username" class="w-full p-2 rounded-lg focus:ring-2 focus:ring-[#2fa12f] focus:outline-none">
        </div>
        <div class="space-y-1">
            <label for="password" class="auth-text-muted text-sm cursor-default">Password</label>
            <input type="password" placeholder="Enter your password" name="password" id="password" required
                autocomplete="current-password" class="w-full p-2 rounded-lg focus:ring-2 focus:ring-[#2fa12f] focus:outline-none">
        </div>

        <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2 cursor-pointer auth-text-muted">
                <input type="checkbox" name="remember" value="1" class="rounded border-gray-500 text-[#2fa12f] focus:ring-[#2fa12f]">
                <span>Remember me</span>
            </label>
            <a href="ForgotPassword.html" class="text-[#2fa12f] hover:underline">Forgot password?</a>
        </div>

        <button type="submit" name="login" id="login" class="w-full text-white bg-[#2fa12f] hover:bg-[#3f7e42] rounded-lg p-2.5 font-medium focus:ring-2 focus:ring-offset-2 focus:ring-offset-[#010301] focus:ring-[#2fa12f] focus:outline-none transition-colors">Log In</button>
    </form>

    <p class="auth-text-subtle cursor-default mt-4 text-sm">Don't have an account? <a href="SignUpPage.html" class="text-[#2fa12f] hover:underline font-medium">Sign Up</a></p>
    </div>

    <script src="theme.js"></script>
    <script src="Log In.js"></script>
</body>
</html>
