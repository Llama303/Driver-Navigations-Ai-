<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password – Drive-NAV</title>
    <link rel="stylesheet" href="../Styl.css">
    <link rel="stylesheet" href="../MainStylsheet.css">
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Oswald&family=Gravitas One&family=Platypi:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
</head>
<body class="themeable bg-[#1a1a1a] text-white flex items-center justify-center h-[100vh]">

    <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle dark/light theme" title="Toggle theme">
        <span class="icon-sun" aria-hidden="true">☀</span>
        <span class="icon-moon" aria-hidden="true">🌙</span>
    </button>

    <div class="auth-card container rounded-lg bg-[#010301] p-6 flex flex-col items-center justify-center w-96 max-w-[90vw] shadow-xl border border-[#1a2a1a]">
        <h1 class="text-2xl font-bold cursor-default mb-1">Drive-NAV</h1>
        <p class="auth-text-muted text-sm mb-6 cursor-default">Reset your password</p>

        <div id="forgot-message" class="auth-error text-sm text-center min-h-[1.25rem] mb-3" aria-live="polite" role="alert"></div>
        <div id="forgot-success" class="text-[#2fa12f] text-sm text-center min-h-[1.25rem] mb-3" aria-live="polite"></div>

        <form id="forgot-form" action="ForgotPassword.PHP" method="post" class="text-[#000000] space-y-3 w-full">
            <div class="space-y-1">
                <label for="email" class="auth-text-muted text-sm cursor-default">Email address</label>
                <input type="email" name="email" id="forgot-email" placeholder="Enter the email for your account" required
                    autocomplete="email" class="w-full p-2 rounded-lg focus:ring-2 focus:ring-[#2fa12f] focus:outline-none">
            </div>
            <button type="submit" name="forgot_submit" id="forgot-submit" class="w-full text-white bg-[#2fa12f] hover:bg-[#3f7e42] rounded-lg p-2.5 font-medium focus:ring-2 focus:ring-offset-2 focus:ring-offset-[#010301] focus:ring-[#2fa12f] focus:outline-none transition-colors">Send reset link</button>
        </form>

        <p class="auth-text-subtle cursor-default mt-4 text-sm"><a href="LogInPage.html" class="font-medium">← Back to Log In</a></p>
    </div>

    <script src="theme.js"></script>
    <script src="ForgotPassword.js"></script>
</body>
</html>
