<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver NAV</title>
    <link rel="stylesheet" href="Styl.css">
    <link rel="stylesheet" href="MainStylsheet.css">
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Oswald&family=Gravitas One&family=Platypi:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">

     <!--This is a ML library in the browser-->
     <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
    
</head>
    <body class="bg-[#1a1a1a] text-white h-[100vh]">

    <!--This wrapps everything-->
  <div class="Container">

    <!--Header with the Buttons-->
    <header class="Buttons">
        <div class="container rounded-lg bg-[#010301] p-4">
            <div class="flex flex-row justify-between items-center w-full">

            <h1 class=" text-[#c0c4d3] text-2xl ml-6 mr-3"><b>Drive-NAV</b></h1>

            <div class="controls">
                <ul class=" flex flex-row gap-4 ">
                    <li>
                        <button id="startCamera" class="px-3 py-1.5 border-none rounded-lg bg-[#2fa12f] cursor-pointer text-base hover:bg-[#3f7e42]">Start Camera</button>
                    </li>
        
                    <li>
                        <button id="stopCamera" class="px-3 py-1.5 border-none rounded-lg bg-[#fd2727] cursor-pointer text-base hover:bg-[#af2525] gap-5">Stop Camera</button>
                    </li>
                </ul>
            </div>

        </div>
        </div>
    </header>

    <!--Main Content Area-->
    <div class="Main-content flex-1 relative">
        <!--Camera View-->
        <div id="camerView" class="view relative">
            <video id="videoElement" class="w-full h-full object-cover" autoplay playsinline></video>
            <canvas id="overLayCanvas" class="absolute pointer-events-none top-0 lrft-0 w-full h-full"></canvas>
        </div>
    </div>

<!--Statuse bar at the buttom-->
<div class="status-bar bg-[#363636] px-4 py-2">
    <span id="statusText">READY</span>
</div>

  </div>

    <script src="App.js"></script>
</body>
</html>
